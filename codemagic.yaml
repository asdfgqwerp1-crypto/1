# Сборка UNSIGNED IPA — подпись делает Sideloadly на Windows
workflows:
  ios-spoof-build:
    name: SafariSpoofBrowser IPA (unsigned)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      # ios_signing НЕ указываем — иначе Codemagic запросит сертификаты
    scripts:
      - name: Build unsigned app
        script: |
          set -euo pipefail
          cd SafariSpoofBrowser
          xcodebuild \
            -project SafariSpoofBrowser.xcodeproj \
            -scheme SafariSpoofBrowser \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            BUILD_DIR="$PWD/build" \
            build 2>&1 | tee build.log
          if [ "${PIPESTATUS[0]}" -ne 0 ]; then
            echo "=== BUILD FAILED — error lines ==="
            grep -nE "error:|fatal error:|cannot find|undefined symbol|Build input file cannot be found" build.log || true
            echo "=== BUILD FAILED — last 80 lines ==="
            tail -80 build.log
            exit 65
          fi
      - name: Package IPA
        script: |
          cd SafariSpoofBrowser
          APP_PATH=$(find build -name "SafariSpoofBrowser.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "APP not found"
            find build -type d
            exit 1
          fi
          mkdir -p build/ipa/Payload
          cp -r "$APP_PATH" build/ipa/Payload/
          cd build/ipa && zip -r ../SafariSpoofBrowser.ipa Payload
          ls -la ../SafariSpoofBrowser.ipa
    artifacts:
      - SafariSpoofBrowser/build/SafariSpoofBrowser.ipa