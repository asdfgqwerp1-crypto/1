name: iOS Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build (unsigned)
        working-directory: SafariSpoofBrowser
        run: |
          xcodebuild \
            -project SafariSpoofBrowser.xcodeproj \
            -scheme SafariSpoofBrowser \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            BUILD_DIR="$PWD/build" \
            build

      - name: Package IPA
        working-directory: SafariSpoofBrowser
        run: |
          APP_PATH=$(find build -name "SafariSpoofBrowser.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "SafariSpoofBrowser.app not found"
            find build -type d
            exit 1
          fi
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r SafariSpoofBrowser-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafariSpoofBrowser-unsigned-ipa
          path: SafariSpoofBrowser/build/SafariSpoofBrowser-unsigned.ipa
          retention-days: 14