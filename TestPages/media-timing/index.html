<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Timing</title>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 16px; }
    .warn { background: #fff3cd; color: #664d03; padding: 12px; border-radius: 8px; margin-bottom: 12px; white-space: pre-wrap; }
    pre { background: #f5f5f7; padding: 12px; border-radius: 8px; font-size: 12px; white-space: pre-wrap; }
    button { padding: 10px 16px; margin: 4px 4px 4px 0; border-radius: 8px; border: none; background: #007aff; color: #fff; }
    button:disabled { opacity: 0.5; }
    #probe { position: fixed; width: 2px; height: 2px; opacity: 0.01; pointer-events: none; bottom: 0; left: 0; }
  </style>
</head>
<body>
  <h1>Media Timing</h1>
  <div id="env-warn" class="warn" hidden></div>
  <button id="btn-start" onclick="start()">Measure 5s</button>
  <button onclick="exportJSON()">Export JSON</button>
  <video id="probe" autoplay playsinline muted></video>
  <pre id="output">Нажмите «Measure 5s»</pre>
  <script src="../common.js"></script>
  <script>
    let report = null;

    (function init() {
      const env = checkMediaEnvironment();
      if (!env.ok) {
        document.getElementById('env-warn').hidden = false;
        document.getElementById('env-warn').textContent = env.message;
      }
    })();

    function measureFrames(video, durationMs) {
      return new Promise(function (resolve) {
        const gaps = [];
        let last = performance.now();
        let frames = 0;
        let method = 'unknown';
        let done = false;

        function finish() {
          if (done) return;
          done = true;
          resolve({ gaps: gaps, frames: frames, method: method });
        }

        const timer = setTimeout(finish, durationMs);

        if (typeof video.requestVideoFrameCallback === 'function') {
          method = 'requestVideoFrameCallback';
          function onFrame() {
            const now = performance.now();
            if (frames > 0) gaps.push(now - last);
            last = now;
            frames++;
            if (!done) video.requestVideoFrameCallback(onFrame);
          }
          video.requestVideoFrameCallback(onFrame);
        } else {
          method = 'currentTime-poll';
          let prevTime = video.currentTime;
          const poll = setInterval(function () {
            const now = performance.now();
            if (video.currentTime !== prevTime) {
              if (frames > 0) gaps.push(now - last);
              last = now;
              frames++;
              prevTime = video.currentTime;
            }
          }, 33);
          setTimeout(function () { clearInterval(poll); }, durationMs);
        }

        setTimeout(function () {
          clearTimeout(timer);
          finish();
        }, durationMs + 50);
      });
    }

    async function start() {
      const env = checkMediaEnvironment();
      if (!env.ok) { showOutput(env.message); return; }

      const btn = document.getElementById('btn-start');
      btn.disabled = true;
      report = null;

      try {
        showOutput('Запрос камеры...');
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        const track = stream.getVideoTracks()[0];
        const durationMs = 5000;

        const video = document.getElementById('probe');
        video.srcObject = stream;
        await video.play().catch(function () {});

        showOutput('Измерение 5 секунд...');

        const measured = await measureFrames(video, durationMs);

        track.stop();
        stream.getTracks().forEach(function (t) { t.stop(); });
        video.srcObject = null;

        const sorted = measured.gaps.slice().sort(function (a, b) { return a - b; });
        const avg = sorted.length ? sorted.reduce(function (a, b) { return a + b; }, 0) / sorted.length : 0;

        report = {
          timestamp: new Date().toISOString(),
          durationMs: durationMs,
          method: measured.method,
          frameCount: measured.frames,
          estimatedFps: measured.frames / (durationMs / 1000),
          gapMs: {
            avg: avg,
            p50: sorted[Math.floor(sorted.length * 0.5)] || 0,
            p95: sorted[Math.floor(sorted.length * 0.95)] || 0,
            min: sorted[0] || 0,
            max: sorted[sorted.length - 1] || 0
          },
          settings: track.getSettings()
        };

        showOutput(JSON.stringify(report, null, 2));
      } catch (e) {
        report = null;
        showOutput('Ошибка: ' + e.name + '\n' + e.message);
      } finally {
        btn.disabled = false;
      }
    }

    function exportJSON() {
      exportReport(report, 'media-timing-report.json');
    }
  </script>
</body>
</html>
